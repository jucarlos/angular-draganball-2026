


<h1>Dragon Ball Super</h1>
<hr>
<!--

Formularios por template tienen la logica en el html y menos lógica en ts

Formulario reactivos tienen poca lógica en el Html ( queda limpio) y la lógica en ts -->




<section class="row">
  <div class="col-12 col-sm-6">

   <add-character
   (emitNewCharacter)="dragonService.addCharacter($event)"
   (emitLengthName)="pintarLon($event)"
   >
   </add-character>

  </div>




  <div class="col-12 col-sm-6">

    <characters-list

        titleList="Listado de Dragon Ball"
        [characters]="dragonService.characters()">

    </characters-list>


  </div>



</section>
